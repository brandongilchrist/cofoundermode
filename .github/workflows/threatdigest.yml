name: ThreatDigest — Daily Curation Pipeline

on:
  schedule:
    # Run daily at 07:00 UTC (before standup)
    - cron: '0 7 * * *'
  workflow_dispatch: # Allow manual triggers

jobs:
  curate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ventures/daily-digest
        run: npm install

      - name: Run Curation Pipeline
        working-directory: ventures/daily-digest
        run: npm run curate

      - name: Commit feed.json
        run: |
          git config user.name "CSO Sentinel + CRO Horizon"
          git config user.email "agents@cofoundermode.ai"
          git add ventures/daily-digest/feed.json
          git diff --staged --quiet || git commit -m "📡 ThreatDigest: daily curation $(date -u +%Y-%m-%d)"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ventures/daily-digest
          destination_dir: .

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatDigest — Crypto Security Intelligence</title>
    <meta name="description"
        content="Real-time crypto threat intelligence. Exploits, vulnerabilities, and on-chain security incidents — curated autonomously.">
    <link rel="stylesheet" href="style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚠</text></svg>">
</head>

<body>

    <!-- Header -->
    <header class="header" role="banner">
        <div class="header-left">
            <div class="logo">
                <span class="logo-bracket">[</span>threat<span class="logo-separator">/</span>digest<span
                    class="logo-bracket">]</span>
            </div>
            <span class="logo-sub">crypto security intelligence</span>
        </div>
        <div class="header-right">
            <time class="header-date" id="current-date"></time>
            <span class="status-pill">
                <span class="status-dot"></span>
                LIVE FEED
            </span>
        </div>
    </header>

    <!-- Stats Bar -->
    <div class="stats-bar" id="stats-bar" role="region" aria-label="Today's statistics">
        <div class="stat-cell">
            <div class="stat-value critical" id="stat-incidents">—</div>
            <div class="stat-label">incidents</div>
        </div>
        <div class="stat-cell">
            <div class="stat-value high" id="stat-losses">—</div>
            <div class="stat-label">total losses</div>
        </div>
        <div class="stat-cell">
            <div class="stat-value medium" id="stat-vulns">—</div>
            <div class="stat-label">new vulns</div>
        </div>
        <div class="stat-cell">
            <div class="stat-value" id="stat-severity" style="color: var(--color-text-muted);">—</div>
            <div class="stat-label">max severity</div>
        </div>
    </div>

    <!-- Main Feed -->
    <main class="container" id="feed-container">
        <div class="loading-state">
            <span class="loading-dots">loading feed</span>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <span class="footer-text">curated by CSO Sentinel + CRO Horizon</span>
            <span class="footer-text">
                pipeline v1.0<span class="footer-cursor"></span>
            </span>
        </div>
    </footer>

    <script src="app.js"></script>
</body>

</html>

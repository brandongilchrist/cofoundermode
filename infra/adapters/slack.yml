# Slack Integration Config

adapter: slack
version: "1.0"

connection:
  bot_token: "${SLACK_BOT_TOKEN}"
  workspace: "cofoundermode"

channels:
  general:
    id: "${SLACK_CHANNEL_GENERAL}"
    purpose: "Company-wide announcements, daily standups"
    post_agents: ["ceo", "coo"]

  engineering:
    id: "${SLACK_CHANNEL_ENGINEERING}"
    purpose: "Engineering discussions, deploy notifications"
    post_agents: ["cto", "cio"]

  security:
    id: "${SLACK_CHANNEL_SECURITY}"
    purpose: "Security alerts, incident notifications"
    post_agents: ["cso"]

  product:
    id: "${SLACK_CHANNEL_PRODUCT}"
    purpose: "Product discussions, spec reviews"
    post_agents: ["cpo"]

  marketing:
    id: "${SLACK_CHANNEL_MARKETING}"
    purpose: "Marketing updates, content reviews"
    post_agents: ["cmo"]

  projects:
    id: "${SLACK_CHANNEL_PROJECTS}"
    purpose: "Project kickoffs, milestone updates"
    post_agents: ["cpo", "cto"]

  reports:
    id: "${SLACK_CHANNEL_REPORTS}"
    purpose: "Weekly reports, financial summaries"
    post_agents: ["ceo", "coo"]

  alerts:
    id: "${SLACK_CHANNEL_ALERTS}"
    purpose: "System alerts, monitoring notifications"
    post_agents: ["cso", "cio"]

notifications:
  mention_routing:
    "@ceo": "ceo"
    "@cto": "cto"
    "@cso": "cso"
    "@cpo": "cpo"
    "@cmo": "cmo"
    "@coo": "coo"
    "@cro": "cro"
    "@cio": "cio"
